name: Build Android Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.13'


    - name: Decode Release Keystore and Create Properties
      env:
        ENCODED_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      run: |
        echo $ENCODED_KEYSTORE | base64 --decode > my-upload-key.jks
        echo "storeFile=my-upload-key.jks" > key.properties
        echo "storePassword=$STORE_PASSWORD" >> key.properties
        echo "keyPassword=$KEY_PASSWORD" >> key.properties
        echo "keyAlias=$KEY_ALIAS" >> key.properties

    - name: Build Release APK and AAB
      run: gradle assembleRelease bundleRelease --stacktrace

    - name: Rename Artifacts
      run: |
        find app/build/outputs/apk/release -name "*.apk" -exec mv {} app/build/outputs/apk/release/gravity-installer.apk \;
        find app/build/outputs/bundle/release -name "*.aab" -exec mv {} app/build/outputs/bundle/release/gravity-installer.aab \;

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: gravity-installer-apk
        path: app/build/outputs/apk/release/gravity-installer.apk

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: gravity-installer-aab
        path: app/build/outputs/bundle/release/gravity-installer.aab
